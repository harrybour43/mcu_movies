<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cinematic Index - Tracker</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --border: #2a2a2a;
            --accent: #00ff88; /* Verde para indicar progresso */
            --text-main: #e0e0e0;
            --text-dim: #888888;
            --movie-tag: #0070f3;
            --series-tag: #7928ca;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding-top: 140px; /* Espaço para o header duplo */
        }

        /* Header e Progress Bar */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .progress-container {
            background: #1a1a1a;
            height: 6px;
            width: 100%;
        }

        #progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--accent);
        }

        .stats {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 20px;
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .filter-bar {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px 20px 25px 20px;
            align-items: flex-end;
        }

        .filter-item { display: flex; flex-direction: column; gap: 8px; }

        label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); }

        input, select {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
            position: relative;
        }

        .card.watched { border-color: var(--accent); opacity: 0.8; }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .type-tag { font-size: 9px; font-weight: bold; padding: 3px 6px; border-radius: 4px; }
        .tag-filme { background: var(--movie-tag); }
        .tag-série { background: var(--series-tag); }

        .title { font-size: 1.2rem; font-weight: 700; margin: 10px 0; }

        /* Estilização do Checkbox de Assistido */
        .watched-control {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-dim);
            padding-top: 15px;
            border-top: 1px solid #222;
        }

        .watched-control input { cursor: pointer; accent-color: var(--accent); width: 18px; height: 18px; }

        .card.watched .title { text-decoration: line-through; color: var(--text-dim); }

        #sentinel { height: 50px; }
    </style>
</head>

            <div class="filter-item">
                <label>Busca</label>
                <input type="text" id="search" placeholder="Título...">
            </div>
            <div class="filter-item">
                <label>Status</label>
                <select id="statusFilter">
                    <option value="all">Todos</option>
                    <option value="watched">Já assisti</option>
                    <option value="unwatched">Não assisti</option>
                </select>
            </div>
            <div class="filter-item">

                    <option value="Filme">Longa</option>
                    <option value="Série">Seriado</option>

        </div>
    </header>

        let watchedIds = JSON.parse(localStorage.getItem('watched_list')) || [];
    let currentData = [...rawData];
    let itemsToShow = 12;

    function updateProgress() {
        // CORREÇÃO: Filtra para contar apenas IDs que existem na rawData atual
        const validWatchedCount = watchedIds.filter(id => 
            rawData.some(item => item.id === id)
        ).length;

        const total = rawData.length;
        const percent = total > 0 ? Math.round((validWatchedCount / total) * 100) : 0;
        
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('percent-text').innerText = `${percent}% (${validWatchedCount}/${total})`;
    }

    // Função para limpar o lixo de IDs antigos do localStorage
    function resetLocalStorage() {
        if(confirm("Deseja zerar todo o seu progresso assistido?")) {
            watchedIds = [];
            localStorage.setItem('watched_list', JSON.stringify([]));
            updateProgress();
            filterAndSort();
        }
    }

    function toggleWatched(id) {
        if (watchedIds.includes(id)) {
            watchedIds = watchedIds.filter(i => i !== id);
        } else {
            watchedIds.push(id);
        }
        localStorage.setItem('watched_list', JSON.stringify(watchedIds));
        updateProgress();
        render(); // Renderização rápida apenas para atualizar o estado do card
    }

        function render() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            currentData.slice(0, itemsToShow).forEach(item => {
                const isWatched = watchedIds.includes(item.id);
                const card = document.createElement('div');
                card.className = `card ${isWatched ? 'watched' : ''}`;
                card.innerHTML = `
                    <div class="card-header">
                        <span class="type-tag tag-${item.f.toLowerCase()}">${item.f}</span>
                        <span class="year" style="color:var(--text-dim); font-size:12px;">${item.y}</span>
                    </div>
                    <div class="title">${item.t}</div>
                    <label class="watched-control">
                        <input type="checkbox" ${isWatched ? 'checked' : ''} onchange="toggleWatched('${item.id}')">
                        ${isWatched ? 'Assistido' : 'Marcar como assistido'}
                    </label>
                `;
                grid.appendChild(card);
            });
        }

        function filterAndSort() {
            const search = document.getElementById('search').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const status = document.getElementById('statusFilter').value;

            currentData = rawData.filter(i => {
                const matchSearch = i.t.toLowerCase().includes(search);
                const matchType = type === 'all' || i.f === type;
                const isWatched = watchedIds.includes(i.id);
                const matchStatus = status === 'all' || 
                                   (status === 'watched' && isWatched) || 
                                   (status === 'unwatched' && !isWatched);
                
                return matchSearch && matchType && matchStatus;
            });

            render();
        }

        // Observer para Scroll Infinito
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && itemsToShow < currentData.length) {
                itemsToShow += 8;
                render();
            }
        });

        observer.observe(document.getElementById('sentinel'));

        // Listeners
        document.getElementById('search').addEventListener('input', filterAndSort);
        document.getElementById('typeFilter').addEventListener('change', filterAndSort);
        document.getElementById('statusFilter').addEventListener('change', filterAndSort);

        // Início
        updateProgress();
        filterAndSort();
